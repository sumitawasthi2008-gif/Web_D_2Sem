<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amazon Clone – Advanced</title>

<style>
/* ===== BASIC ===== */
body{
    margin:0;
    font-family:Arial;
    background:#EAEDED;
    transition:0.3s;
}
.dark{
    background:#121212;
    color:white;
}

/* ===== HEADER ===== */
.navbar{
    background:#131921;
    color:white;
    display:flex;
    align-items:center;
    padding:10px 20px;
}
.logo{
    font-size:24px;
    font-weight:bold;
    color:#FF9900;
    margin-right:20px;
}
.location{
    font-size:12px;
    margin-right:15px;
}
.search-box{
    flex:1;
    display:flex;
}
.search-box select,
.search-box input{
    padding:8px;
    border:none;
}
.search-box input{width:100%;}
.search-box button{
    background:#febd69;
    border:none;
    padding:8px 12px;
}
.nav-links{
    margin-left:15px;
    cursor:pointer;
}

/* ===== HERO ===== */
.hero{
    height:220px;
    background:url("https://m.media-amazon.com/images/G/31/img21/Wireless/WLA/MayART/D23818516_IN_WLD-MayART_GW_Hero_3000x1200._CB589594919_.jpg");
    background-size:cover;
}

/* ===== PRODUCTS ===== */
.products{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    padding:20px;
}
.product{
    background:white;
    padding:15px;
    border-radius:5px;
    text-align:center;
    transition:0.3s;
}
.product:hover{transform:scale(1.05);}
.product img{height:150px;}
.old{color:gray;text-decoration:line-through;font-size:13px;}
.price{color:green;font-weight:bold;}
.rating{color:orange;}

.btn{
    padding:6px;
    width:100%;
    margin-top:5px;
    cursor:pointer;
}
.cart-btn{background:#ffd814;border:none;}
.wish{background:pink;border:none;}

/* ===== CART ===== */
.cart-box{
    background:white;
    padding:15px;
    margin:20px;
}
.cart-box h2{text-align:center;}

/* ===== FOOTER ===== */
footer{
    background:#131921;
    color:white;
    text-align:center;
    padding:15px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    .products{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="navbar">
<div class="logo">amazon</div>
<div class="location">📍 Deliver to Kanpur</div>

<div class="search-box">
<select>
<option>All</option>
<option>Electronics</option>
<option>Fashion</option>
</select>
<input type="text" id="search" placeholder="Search Amazon" onkeyup="searchProduct()">
<button>🔍</button>
</div>

<div class="nav-links" onclick="toggleDark()">🌙</div>
<div class="nav-links">🛒 Cart (<span id="count">0</span>)</div>
</div>

<div class="hero"></div>

<!-- PRODUCTS -->
<div class="products" id="products">

<div class="product">
<img src="https://image.oppo.com/content/dam/oppo/common/mkt/v2-2/f29-series-in/f29/navigation/440-440-black-v2.png">
<h3>Smartphone</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="old">₹19,999</p>
<p class="price">₹15,999</p>
<button class="btn cart-btn" onclick="addCart(15999)">Add to Cart</button>
<button class="btn wish">❤️ Wishlist</button>
</div>

<div class="product">
<img src="https://img.global.news.samsung.com/in/wp-content/uploads/2024/07/Venus_EXT_16_UK_Gray_007_Top-L-Perspective-e1720170818626.jpg">
<h3>Laptop</h3>
<div class="rating">⭐⭐⭐⭐⭐</div>
<p class="price">₹45,999</p>
<button class="btn cart-btn" onclick="addCart(45999)">Add to Cart</button>
<button class="btn wish">❤️ Wishlist</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/51rpbVmi9XL._SL1200_.jpg">
<h3>Headphones</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="price">₹1,999</p>
<button class="btn cart-btn" onclick="addCart(1999)">Add to Cart</button>
<button class="btn wish">❤️ Wishlist</button>
</div>

<div class="product">
<img src="https://tse1.mm.bing.net/th/id/OIP.tW2THcHjVClz4akyleVEsgHaJY">
<h3>Smart Watch</h3>
<div class="rating">⭐⭐⭐⭐☆</div>
<p class="price">₹2,999</p>
<button class="btn cart-btn" onclick="addCart(2999)">Add to Cart</button>
<button class="btn wish">❤️ Wishlist</button>
</div>

</div>

<!-- CART -->
<div class="cart-box">
<h2>🧾 Cart Summary</h2>
<p>Total Items: <span id="items">0</span></p>
<p>Total Price: ₹<span id="total">0</span></p>
<button class="btn cart-btn" onclick="checkout()">Proceed to Checkout</button>
</div>

<!-- FOOTER -->
<footer>
© 2025 Amazon Clone  
<br>HTML • CSS • JavaScript • Flexbox • Grid • LocalStorage
</footer>

<script>
let count = localStorage.getItem("count") || 0;
let total = localStorage.getItem("total") || 0;

document.getElementById("count").innerText = count;
document.getElementById("items").innerText = count;
document.getElementById("total").innerText = total;

function addCart(price){
    count++;
    total = parseInt(total) + price;
    localStorage.setItem("count",count);
    localStorage.setItem("total",total);
    document.getElementById("count").innerText = count;
    document.getElementById("items").innerText = count;
    document.getElementById("total").innerText = total;
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

function searchProduct(){
    let val=document.getElementById("search").value.toLowerCase();
    let p=document.getElementsByClassName("product");
    for(let i=0;i<p.length;i++){
        let name=p[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
        p[i].style.display=name.includes(val)?"block":"none";
    }
}

function checkout(){
    alert("Checkout Successful (Dummy) ✅");
}
</script>

</body>
</html>
